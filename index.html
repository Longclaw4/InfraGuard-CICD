<!DOCTYPE html>
<html>
<head>
  <title>InfraGuard---Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e3a8a);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .badge {
      background: green;
      padding: 10px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    .section {
      margin-top: 25px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .danger { background: red; color: white; }
    .ok { color: lightgreen; }
    .warn { color: yellow; }

    #logs {
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log {
      background: black;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>
      <h1>InfraGuard---Dashboard</h1>
      <p>Jenkins + Terraform + AWS</p>
    </div>
    <div class="badge" id="status">COMPLIANT</div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Pipeline</h3>
      <p id="pipelineStatus">SUCCESS</p>
    </div>

    <div class="card">
      <h3>Instance ID</h3>
      <p id="instanceId">Loading...</p>
    </div>

    <div class="card">
      <h3>Public IP</h3>
      <p id="publicIp">Loading...</p>
    </div>

    <div class="card">
      <h3>State</h3>
      <p id="instanceState">Running</p>
    </div>
  </div>

  <div class="section">
    <h2>Deployment Info</h2>
    <p><b>Last Deploy:</b> <span id="deployTime">Loading...</span></p>
  </div>

  <div class="section">
    <h2>Drift Detection & Auto-Healing</h2>

    <button class="danger" onclick="drift()">Simulate Drift</button>
    <button onclick="heal()">Auto Heal</button>

    <p id="secStatus" class="ok">System secure</p>

    <div id="logs">
      <div class="log">[INFO] Dashboard Loaded</div>
    </div>
  </div>

</div>

<!-- LIVE DATA FROM JENKINS -->
<script src="data.js"></script>

<script>

// 🔥 PUT YOUR API URL HERE
const API_URL = "https://xagu169m4c.execute-api.us-east-1.amazonaws.com/action";

function updateUI(){
  document.getElementById("pipelineStatus").innerText = window.pipelineStatus || "SUCCESS";
  document.getElementById("instanceId").innerText = window.instanceId || "Not found";
  document.getElementById("publicIp").innerText = window.publicIp || "Not found";
  document.getElementById("instanceState").innerText = window.instanceState || "Running";
  document.getElementById("deployTime").innerText = window.lastDeploy || "Unknown";
}

function log(msg){
  const d = document.createElement("div");
  d.className = "log";
  d.innerText = msg;
  document.getElementById("logs").prepend(d);
}

// 🔥 CALL BACKEND
async function callBackend(action) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ action: action })
    });

    const data = await res.json();
    log("[BACKEND] " + data.message);
  } catch (err) {
    log("[ERROR] API call failed");
  }
}

// 🔥 DRIFT BUTTON
async function drift(){
  document.getElementById("status").innerText = "DRIFT";
  document.getElementById("status").style.background="red";
  document.getElementById("secStatus").innerText = "Public SSH detected!";
  document.getElementById("secStatus").className="warn";

  log("[UI] Sending drift request...");
  await callBackend("drift");
}

// 🔥 HEAL BUTTON
async function heal(){
  document.getElementById("status").innerText = "HEALED";
  document.getElementById("status").style.background="green";
  document.getElementById("secStatus").innerText = "Issue fixed";
  document.getElementById("secStatus").className="ok";

  log("[UI] Sending auto-heal request...");
  await callBackend("heal");
}

window.onload = updateUI;

</script>

</body>
</html>
