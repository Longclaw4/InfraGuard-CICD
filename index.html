<!DOCTYPE html>
<html>
<head>
  <title>InfraGuard Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e3a8a);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .badge {
      background: green;
      padding: 10px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    .section {
      margin-top: 25px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .danger { background: red; color: white; }
    .ok { color: lightgreen; }
    .warn { color: yellow; }

    .log {
      background: black;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      font-family: monospace;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div>
      <h1>InfraGuard Dashboard</h1>
      <p>Jenkins + Terraform + AWS</p>
    </div>
    <div class="badge" id="status">LOADING...</div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Pipeline</h3>
      <p id="pipelineStatus">-</p>
    </div>

    <div class="card">
      <h3>Instance ID</h3>
      <p id="instanceId">-</p>
    </div>

    <div class="card">
      <h3>Public IP</h3>
      <p id="publicIp">-</p>
    </div>

    <div class="card">
      <h3>State</h3>
      <p id="instanceState">-</p>
    </div>
  </div>

  <div class="section">
    <h2>Deployment Info</h2>
    <p><b>Last Deploy:</b> <span id="deployTime">-</span></p>
  </div>

  <div class="section">
    <h2>Drift Simulation</h2>

    <button class="danger" onclick="drift()">Simulate Drift</button>
    <button onclick="heal()">Auto Heal</button>

    <p id="secStatus" class="ok">System secure</p>

    <div id="logs"></div>
  </div>

</div>

<script src="data.js"></script>

<script>
function updateUI(){
  document.getElementById("pipelineStatus").innerText = window.pipelineStatus;
  document.getElementById("instanceId").innerText = window.instanceId;
  document.getElementById("publicIp").innerText = window.publicIp;
  document.getElementById("instanceState").innerText = window.instanceState;
  document.getElementById("deployTime").innerText = window.lastDeploy;

  document.getElementById("status").innerText = "COMPLIANT";
}

function log(msg){
  const d = document.createElement("div");
  d.className = "log";
  d.innerText = msg;
  document.getElementById("logs").prepend(d);
}

function drift(){
  document.getElementById("status").innerText = "DRIFT";
  document.getElementById("status").style.background="red";
  document.getElementById("secStatus").innerText = "Public SSH detected!";
  document.getElementById("secStatus").className="warn";

  log("Drift detected: SSH opened to public");
}

function heal(){
  document.getElementById("status").innerText = "HEALED";
  document.getElementById("status").style.background="green";
  document.getElementById("secStatus").innerText = "Issue fixed";
  document.getElementById("secStatus").className="ok";

  log("Auto-heal executed via Lambda simulation");
}

window.onload = updateUI;
</script>

</body>
</html>
